name: redcat-billing-prod

services:
  postgres:
    image: postgres:15-alpine
    container_name: redcat-billing-db-prod
    restart: unless-stopped
    ports:
      - '${DB_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME} -d ${DB_NAME}']
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: redcat-billing-api:prod
    container_name: redcat-billing-api-prod
    restart: unless-stopped
    ports:
      - '${PORT:-7000}:7000'
    env_file:
      - .env.prod
    environment:
      DB_HOST: postgres
      DB_PORT: '5432'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data_prod:
